# Dataset manifest for Klacansky volumes.
#
# Notes:
# - All datasets are little-endian (per Klacansky dataset page).
# - Dimensions are width x height x depth.
# - Raw byte stream ordering is consistent with C-style indexing:
#     array[depth][height][width]
#   meaning width (x) changes fastest in the file, then height (y), then depth (z).
#
# Store `shape_whd` as [width, height, depth] to match the source listing & filenames.

version: 1
default:
  source: "https://klacansky.com/open-scivis-datasets/"
  endian: "little"
  axis_order: "whd"   # width, height, depth
  numpy_order: "C"

datasets:
  aneurism:
    path: "datasets/klacansky/aneurism_256x256x256_uint8.raw"
    shape_whd: [256, 256, 256]
    dtype: "uint8"
    category: "CT"

